# ── Aurya — Production Reverse Proxy ──────────────────
# Container nginx-proxy. Gestisce:
#   - terminazione TLS (Let's Encrypt via certbot)
#   - /api/*        → backend
#   - route SEO pubbliche → backend /__seo/* (meta iniettati server-side)
#   - sitemap/robots/IndexNow → backend
#   - tutto il resto (asset, route SPA admin) → frontend statico
#   - security headers
#
# Dominio: aurya.life (hardcoded — è il nostro, niente placeholder da
# sostituire a mano: il processo resta replicabile).

# Rate limit login (backup app-level slowapi)
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
# Rate limit signup (backup DOS: slowapi fa 5/15min, questo ferma il
# brute-force da un singolo IP prima che tocchi Python)
limit_req_zone $binary_remote_addr zone=signup:10m rate=5r/m;

server {
    listen 80;
    server_name aurya.life www.aurya.life;

    # ACME challenge per certbot (HTTP-01)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tutto il resto → HTTPS
    location / {
        return 301 https://aurya.life$request_uri;
    }
}

# www → apex (canonico su aurya.life senza www)
server {
    listen 443 ssl http2;
    server_name www.aurya.life;

    ssl_certificate     /etc/letsencrypt/live/aurya.life/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aurya.life/privkey.pem;

    return 301 https://aurya.life$request_uri;
}

server {
    listen 443 ssl http2;
    server_name aurya.life;

    # ── TLS (gestito da certbot) ─────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/aurya.life/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aurya.life/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # ── Security headers ─────────────────────────────────────────
    # HSTS: HTTPS-only per 1 anno. `preload` → candidabile alla lista
    # preload dei browser (submit su hstspreload.org DOPO 1 settimana
    # di soak). La rimozione dal preload richiede mesi.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # geolocation=(self): il "vicino a me" della directory usa la
    # posizione del browser (con consenso), quindi self, non ().
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self), usb=(), bluetooth=(), magnetometer=(), gyroscope=()" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    # ── Content Security Policy ──────────────────────────────────
    # script-src 'self' 'unsafe-eval'  → bundle app; unsafe-eval per
    #     recharts/framer-motion (new Function). NO unsafe-inline.
    # style-src 'unsafe-inline'  → Tailwind/Radix iniettano <style>.
    # img-src ... https:  → tile OpenStreetMap (Leaflet), OG-image,
    #     loghi remoti. media-src 'self'  → video hero (locale /media).
    #     connect-src 'self'  → /api same-origin (Nominatim è server-side).
    # frame-src iframe.mediadelivery.net  → embed video corsi (Bunny).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.ingest.sentry.io https://*.ingest.de.sentry.io; frame-src https://iframe.mediadelivery.net; media-src 'self' https: blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; worker-src 'self' blob:; manifest-src 'self'" always;

    # Upload limit (allineato al backend F4)
    client_max_body_size 55m;

    # ── API → backend ────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        location /api/auth/login {
            limit_req zone=login burst=5 nodelay;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /api/auth/signup {
            limit_req zone=signup burst=3 nodelay;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /api/customer-auth/signup {
            limit_req zone=signup burst=3 nodelay;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ── File caricati (immagini prodotti, cover, loghi) → backend ──
    location /uploads/ {
        proxy_pass http://backend:8000/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── SEO: sitemap (indice S3 + sotto-sitemap) → backend ───────
    # /sitemap.xml → /api/public/sitemap.xml ; /sitemap-core.xml → …-core.xml
    location ~ ^/sitemap([a-z-]*)\.xml$ {
        proxy_pass http://backend:8000/api/public/sitemap$1.xml;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── SEO: robots.txt + file chiave IndexNow (*.txt a root) → backend ──
    location ~ ^/[^/]+\.txt$ {
        proxy_pass http://backend:8000$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── SEO shell: home ──────────────────────────────────────────
    # Le pagine pubbliche escono dal backend con title/OG/JSON-LD già
    # iniettati (crawler social e Bing leggono l'HTML iniziale, non il
    # JS). Gli asset (/static, /media, favicon…) NON matchano qui →
    # vanno al frontend statico (blocco `location /` in fondo).
    location = / {
        proxy_pass http://backend:8000/__seo/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── SEO shell: pagine di contenuto pubblico ──────────────────
    # ritiri, landing evento /e/, landing prodotto /p /ph /dg /co /r,
    # /operatori, /destinazioni, profilo /o/, store /s/, /blog, pagine
    # brand. Il match richiede la keyword seguita da `/` o fine stringa:
    # /orders, /reviews, /stores NON matchano (restano SPA admin).
    location ~ ^/(ritiri|e|p|ph|dg|co|r|operatori|destinazioni|o|s|blog|chi-siamo|come-funziona)(/|$) {
        proxy_pass http://backend:8000/__seo$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Tutto il resto → frontend statico ────────────────────────
    # Asset della build + route SPA private (/dashboard, /login,
    # /account, /inizia, /incassi, /visibilita, /reviews, /newsletter…).
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
