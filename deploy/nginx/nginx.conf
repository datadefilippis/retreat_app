# ── AFianco — Production Reverse Proxy ────────────────
# Runs as the nginx-proxy container. Handles:
#   - TLS termination (Let's Encrypt via certbot)
#   - /api/* proxied to backend container
#   - /* proxied to frontend container (static React build)
#   - Security headers
#
# PLACEHOLDER: replace YOUR_DOMAIN with your actual domain.

# Rate limit zone for login abuse (backup to app-level slowapi)
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;

# Track O Step 1.6 — signup abuse shield (open beta hardening).
#
# App-level slowapi enforces the precise quota of 5/15min on both
# /api/auth/signup (merchant) and /api/customer-auth/signup (customer);
# this nginx zone is the DOS backup that catches obvious brute-force
# (1000s req/min from a single IP) BEFORE the request reaches Python,
# saving CPU + Mongo from being a soft target.
#
# rate=5r/m  → sustained 5 requests / minute per IP (30x the app quota,
#              so legitimate users never hit this; only attackers do).
# burst=3 nodelay (applied on the location) → brief bursts of 3 absorbed
#              without delay, anything beyond → 503 immediately.
#
# Zone memory: 10m ≈ 160k unique IP slots, plenty for open beta scale.
limit_req_zone $binary_remote_addr zone=signup:10m rate=5r/m;

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # ACME challenge for certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # ── TLS certificates (managed by certbot) ────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # Modern TLS config
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # ── Security headers (Phase 1 — Step D1: CSP hardening + HSTS preload) ──
    #
    # Strict-Transport-Security
    #   max-age=31536000  → browser remembers HTTPS-only for 1 year.
    #   includeSubDomains → ALL subdomains under afianco.app are HTTPS-only.
    #   preload           → declares willingness to be in browsers' built-in
    #                       HSTS preload list. SUBMIT manually at
    #                       https://hstspreload.org/ AFTER 1 week of soak in
    #                       production. Removal from preload takes 6+ months,
    #                       so confirm all subdomains are TLS-ready first.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # X-Frame-Options DENY  → no embedding in any frame (anti-clickjacking).
    # Superseded by CSP frame-ancestors 'none' on modern browsers but kept
    # for defense-in-depth on older browsers that ignore CSP.
    add_header X-Frame-Options "DENY" always;

    # MIME-sniffing protection: browser must trust the Content-Type header.
    add_header X-Content-Type-Options "nosniff" always;

    # X-XSS-Protection REMOVED on purpose: deprecated by all modern browsers
    # (Chrome dropped it in 78). The legacy filter could itself be exploited
    # via reflected-XSS-via-XSS-filter bugs. CSP is the proper replacement.

    # Referrer policy: send referrer only to same-origin OR cross-origin
    # over HTTPS, never downgrade to HTTP and never leak path/query.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions policy (was Feature-Policy): hard-deny browser APIs that
    # the app does not legitimately need. payment=(self) keeps the future
    # Payment Request API available for AFianco's own pages only.
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self), usb=(), bluetooth=(), magnetometer=(), gyroscope=()" always;

    # X-Permitted-Cross-Domain-Policies: legacy Flash/PDF cross-domain
    # access policy. We have neither, so deny outright.
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    # ── Content Security Policy (rigoroso ma funzionante) ────────
    #
    # default-src 'self'      → fallback for any directive not listed below.
    # script-src 'self' 'unsafe-eval'
    #     'self'        → app bundle (CRA emits a single `main.<hash>.js`).
    #     'unsafe-eval' → kept temporarily because some 3rd-party libraries
    #                     in our deps tree (recharts, framer-motion) may use
    #                     `new Function()` for runtime expression compilation.
    #                     Plan: remove after browser-side audit during a
    #                     future hardening pass.
    #     NO 'unsafe-inline'  → React production build emits NO inline scripts.
    # style-src 'self' 'unsafe-inline' https://fonts.googleapis.com
    #     'unsafe-inline' is REQUIRED — Tailwind utility classes, Radix UI,
    #     framer-motion all inject inline `<style>` tags at runtime. There
    #     is no nonce-based alternative without a CRA fork.
    #     fonts.googleapis.com → CSS @import in src/index.css (Manrope, Public
    #     Sans, JetBrains Mono families).
    # font-src 'self' data: https://fonts.gstatic.com
    #     fonts.gstatic.com → actual font files referenced by Google CSS.
    #     data: → Tailwind/Radix sometimes inline tiny font glyphs.
    # img-src 'self' data: blob: https:
    #     'self' for uploaded product images / logos.
    #     data: + blob: for inline previews (image upload preview before save).
    #     https: kept permissive for OG-card images, avatars, future CDN.
    # connect-src 'self' https://*.ingest.sentry.io https://*.ingest.de.sentry.io
    #     'self' for /api/* backend calls (same-origin via nginx).
    #     Sentry hostnames: SDK reports events to project DSN region (de = EU).
    # frame-src https://iframe.mediadelivery.net
    #     ONLY Bunny Stream embed for video courses. NOT 'self' (we don't embed
    #     ourselves), NOT Stripe (checkout is full-page redirect, not iframe).
    # media-src 'self' https: blob:
    #     Defensive: any future <video>/<audio> in our main document.
    # object-src 'none'   → no Flash, no <embed>, no <object>.
    # base-uri 'self'     → can't change <base> to redirect relative URLs.
    # form-action 'self'  → forms submit only to our origin.
    # frame-ancestors 'none' → identical effect to X-Frame-Options: DENY but
    #                          on modern browsers; complements the legacy header.
    # worker-src 'self' blob: → service workers / web workers from same origin.
    # manifest-src 'self'   → PWA manifest.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.ingest.sentry.io https://*.ingest.de.sentry.io; frame-src https://iframe.mediadelivery.net; media-src 'self' https: blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; worker-src 'self' blob:; manifest-src 'self'" always;

    # ── Upload size limit (matches backend F4: 50MB) ─────────────
    client_max_body_size 55m;

    # ── API → backend container ──────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running AI endpoints
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Rate limit on login endpoint (nginx-level backup)
        location /api/auth/login {
            limit_req zone=login burst=5 nodelay;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Track O Step 1.6 — Rate limit on merchant signup (nginx backup).
        # App-level slowapi enforces 5/15min; this zone catches brute-force DOS.
        location /api/auth/signup {
            limit_req zone=signup burst=3 nodelay;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Track O Step 1.6 — Rate limit on customer signup (nginx backup).
        # Same zone as merchant signup: shared per-IP budget makes mass-signup
        # attacks more painful (attacker can't switch routes to evade).
        location /api/customer-auth/signup {
            limit_req zone=signup burst=3 nodelay;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ── Uploaded files (product images, logos) → backend container ──
    location /uploads/ {
        proxy_pass http://backend:8000/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Everything else → frontend container ─────────────────────
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
