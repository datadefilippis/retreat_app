# ── Bootstrap nginx config — HTTP only (no TLS) ─────────────────
# Use this config for FIRST deploy before certificates exist.
#
# Steps:
#   1. Start stack with this config mounted instead of nginx.conf
#   2. Run certbot to obtain certificates
#   3. Switch to the full nginx.conf (with TLS)
#   4. Reload nginx
#
# See DEPLOY.md for the exact command sequence.

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # ACME challenge for certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # During bootstrap, serve everything via HTTP (temporary)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
