# ── Bootstrap nginx — HTTP only (no TLS) ────────────────────────
# Usato per il PRIMO avvio (prima che esista il certificato) e per
# servire la ACME challenge di Let's Encrypt. Stesso routing SEO del
# config di produzione (nginx.conf) ma su :80 senza redirect a HTTPS,
# così il sito è già visibile e corretto sull'IP.
#
# Sequenza:
#   1. avvia lo stack con questo config (NGINX_CONF=…/nginx-bootstrap.conf)
#   2. punta il DNS aurya.life → server, poi certbot ottiene il cert
#   3. riavvia senza NGINX_CONF → si usa nginx.conf (con TLS)

server {
    listen 80 default_server;
    server_name aurya.life www.aurya.life _;

    # ACME challenge per certbot (HTTP-01)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    client_max_body_size 55m;

    # ── API → backend ──
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── File caricati → backend ──
    location /uploads/ {
        proxy_pass http://backend:8000/uploads/;
        proxy_set_header Host $host;
    }

    # ── SEO: sitemap → backend /api/public/sitemap*.xml ──
    location ~ ^/sitemap([a-z-]*)\.xml$ {
        proxy_pass http://backend:8000/api/public/sitemap$1.xml;
        proxy_set_header Host $host;
    }

    # ── SEO: robots.txt + chiave IndexNow (*.txt) → backend ──
    location ~ ^/[^/]+\.txt$ {
        proxy_pass http://backend:8000$request_uri;
        proxy_set_header Host $host;
    }

    # ── SEO shell: home ──
    location = / {
        proxy_pass http://backend:8000/__seo/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── SEO shell: pagine pubbliche ──
    location ~ ^/(ritiri|e|p|ph|dg|co|r|operatori|destinazioni|o|s|blog|chi-siamo|come-funziona)(/|$) {
        proxy_pass http://backend:8000/__seo$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Tutto il resto → frontend statico ──
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
