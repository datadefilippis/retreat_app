# ── Frontend container nginx — internal only ─────────────────────
# This config runs INSIDE the frontend container (port 80).
# It serves the React build and returns index.html for SPA routes.
# The main reverse proxy (nginx-proxy container) handles TLS and
# proxies traffic here.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any route not matching a file → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (hashed filenames from CRA build)
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Disable access to dotfiles
    location ~ /\. {
        deny all;
        return 404;
    }
}
