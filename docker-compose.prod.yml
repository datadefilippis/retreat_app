# ── AFianco — Production Docker Compose ───────────────
#
# Usage:
#   1. Copy .env.example to .env.production and fill in real values
#   2. Replace YOUR_DOMAIN in deploy/nginx/nginx.conf
#   3. docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Architecture:
#   nginx-proxy (:80/:443) → frontend (:80 internal) for static
#   nginx-proxy (:80/:443) → backend (:8000 internal) for /api/*
#   backend → mongodb (:27017 internal, not exposed)

services:
  # ── MongoDB ──────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: ms-mongodb
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
    networks:
      - internal
    # NOT exposed to host — only reachable by backend via internal network
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval 'db.adminCommand(\"ping\")' -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --quiet"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Backend (FastAPI) ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ms-backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - MONGO_URL=mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/${DB_NAME}?authSource=admin
      - DB_NAME=${DB_NAME}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - ENVIRONMENT=production
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - BACKGROUND_ALERT_INTERVAL_HOURS=${BACKGROUND_ALERT_INTERVAL_HOURS:-6}
      - BACKGROUND_INITIAL_DELAY_SECONDS=${BACKGROUND_INITIAL_DELAY_SECONDS:-60}
      # Wave 10/11/12 env knobs (added 2026-05-16 during W12 deploy)
      - AI_BUDGETS_SEED_DISABLED=${AI_BUDGETS_SEED_DISABLED:-}
      - LLM_NON_CHAT_MODEL=${LLM_NON_CHAT_MODEL:-}
      - LLM_PROMPT_CACHE=${LLM_PROMPT_CACHE:-1}
      - LLM_MAX_CONCURRENT=${LLM_MAX_CONCURRENT:-20}
      - LLM_PII_REDACTION=${LLM_PII_REDACTION:-1}
      - AI_FAIL_OPEN_LIMIT=${AI_FAIL_OPEN_LIMIT:-100}
      - AI_FAIL_OPEN_WINDOW_SEC=${AI_FAIL_OPEN_WINDOW_SEC:-600}
      - AI_USAGE_RETENTION_DAYS=${AI_USAGE_RETENTION_DAYS:-730}
      - LLM_PER_USER_MINUTE=${LLM_PER_USER_MINUTE:-30}
      - LLM_PER_USER_DAILY_TOKENS=${LLM_PER_USER_DAILY_TOKENS:-200000}
      - CHAT_MAX_TOOL_RESULT_CHARS=${CHAT_MAX_TOOL_RESULT_CHARS:-10000}
      - CHAT_MAX_HISTORY_CHARS=${CHAT_MAX_HISTORY_CHARS:-100000}
      # Optional S3
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-}
      - AWS_REGION=${AWS_REGION:-eu-west-1}
      # Email (Brevo)
      - BREVO_API_KEY=${BREVO_API_KEY:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-noreply@yourdomain.com}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-AFianco}
      # Phase 1 Step B2 — shared secret for inbound /api/webhooks/brevo
      # (validates Brevo's bounce/complaint webhook calls). When unset the
      # endpoint default-denies (503), so unconfigured deployments are safe.
      - BREVO_WEBHOOK_SECRET=${BREVO_WEBHOOK_SECRET:-}
      - APP_URL=${APP_URL:-https://afianco.app}
      # PUBLIC_APP_URL is the customer-facing host embedded in
      # post-purchase email links (/t/<token>, /b/<token>, /rsv/<token>,
      # /d/<token>, /account/courses/...). Without this var the backend
      # falls back to http://localhost:3000 inside services/url_builder.py
      # and customers receive ticket emails that point at localhost. Same
      # default as APP_URL today; the dual setting lets us split them
      # later (e.g. if a separate admin host is introduced).
      - PUBLIC_APP_URL=${PUBLIC_APP_URL:-https://afianco.app}
      # Stripe (Billing v5.0)
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      # Stripe Connect (Commerce payments — Express only after Block 6)
      # STRIPE_CLIENT_ID was used for legacy Standard OAuth and is no longer
      # required. Safe to unset in .env.production.
      - STRIPE_WEBHOOK_SECRET_CONNECT=${STRIPE_WEBHOOK_SECRET_CONNECT:-}
      - FRONTEND_URL=${FRONTEND_URL:-https://afianco.app}
      # Observability (Sentry — Phase 1 Step A1)
      # Opt-in: if SENTRY_DSN is empty in .env.production, init_sentry()
      # returns False silently and the app runs identically (no events
      # captured, no outbound calls, zero overhead).
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_TRACES_RATE=${SENTRY_TRACES_RATE:-0.1}
      - RELEASE_SHA=${RELEASE_SHA:-}
      # Logging (Phase 1 Step A3) — JSON in production for Loki/Datadog/ELK
      # readiness. Default text in dev. LOG_LEVEL: DEBUG/INFO/WARNING/ERROR.
      - LOG_FORMAT=${LOG_FORMAT:-text}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - internal
    # Not exposed to host — nginx-proxy reaches it via internal network

  # ── Frontend (React static build via nginx) ──────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Observability frontend (Phase 1 — Step A2)
        # Read from .env.production at build time and injected into the
        # React bundle via Dockerfile ARG → ENV → CRA's process.env.
        # If REACT_APP_SENTRY_DSN is empty, frontend Sentry stays disabled
        # silently (init returns false, no overhead, no PII risk).
        - REACT_APP_SENTRY_DSN=${REACT_APP_SENTRY_DSN:-}
        - REACT_APP_SENTRY_TRACES_RATE=${REACT_APP_SENTRY_TRACES_RATE:-0.1}
        - REACT_APP_SENTRY_ENVIRONMENT=${REACT_APP_SENTRY_ENVIRONMENT:-production}
        - REACT_APP_RELEASE_SHA=${REACT_APP_RELEASE_SHA:-}
    container_name: ms-frontend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - internal
    # Not exposed to host — nginx-proxy reaches it via internal network

  # ── Reverse Proxy (nginx + TLS) ─────────────────────────────────
  nginx-proxy:
    image: nginx:1.27-alpine
    container_name: ms-nginx
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    networks:
      - internal

  # ── Certbot (TLS certificate renewal) ───────────────────────────
  # Run manually first time:
  #   docker compose -f docker-compose.prod.yml run --rm certbot \
  #     certonly --webroot -w /var/www/certbot -d YOUR_DOMAIN
  # Auto-renewal: add cron job on host:
  #   0 3 * * * docker compose -f docker-compose.prod.yml run --rm certbot renew && \
  #             docker compose -f docker-compose.prod.yml exec nginx-proxy nginx -s reload
  certbot:
    image: certbot/certbot
    container_name: ms-certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    profiles:
      - certbot   # Only runs when explicitly invoked

volumes:
  mongo_data:
    name: ms-mongo-data
  backend_uploads:
    name: ms-backend-uploads
  certbot_conf:
    name: ms-certbot-conf
  certbot_www:
    name: ms-certbot-www

networks:
  internal:
    name: ms-internal
    driver: bridge
