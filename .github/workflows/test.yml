# Track S Step 4.2 — CI test pipeline
#
# Gates: PR + push to main. All jobs must pass before merge.
#
# 3 jobs in parallel matrix:
#   1. backend-pytest: pytest invariants + business logic
#   2. embed-sdk-vitest: Web Components sentinel tests
#   3. packages-vitest: shared-types + api-client + design-tokens
#
# Total time target: < 5 min cold, < 2 min warm (cached deps).

name: test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:  # manual trigger from Actions UI

# Cancel in-progress runs when new commits pushed to the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Track O Step 5.4 — opt-in Node.js 24 runtime per JavaScript actions.
# Vedi commento esteso in security.yml per il razionale completo.
# TL;DR: GitHub deprecata Node 20 da Sept 2026, env var forza JS
# actions a girare su Node 24 backward-compat.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ─── Backend Python tests ──────────────────────────────────────────
  backend-pytest:
    name: backend / pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # Test-safe env vars — required by app boot but never used in test
      JWT_SECRET_KEY: ci-test-secret-do-not-use-in-production
      MONGO_URL: mongodb://localhost:27017
      DB_NAME: afianco_ci_test
      ANTHROPIC_API_KEY: test-key-ci-mock
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # NB: pytest-asyncio + pytest-cov sono in requirements.txt
          # (Track S Step 4.4 round 2 — eliminato duplicato).

      - name: Run pytest with coverage
        working-directory: backend
        run: |
          pytest \
            --ignore=tests/test_new_features.py \
            -q \
            --tb=short \
            --maxfail=5 \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing:skip-covered

      - name: Upload backend coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 30

  # ─── Embed-SDK Web Components tests ────────────────────────────────
  embed-sdk-vitest:
    name: embed-sdk / vitest
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11.4.0
          run_install: false

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (workspace deps for embed-sdk)
        # embed-sdk consuma @afianco/design-tokens + api-client + shared-types
        # via "main: ./dist/index.cjs". I dist NON sono committed → senza
        # build esplicito vitest fail con "Failed to resolve entry for
        # package @afianco/design-tokens".
        run: pnpm --filter "./packages/**" build

      - name: Run embed-sdk vitest
        # Track S Step 4.4: JS coverage deferred a V2 — richiede
        # @vitest/coverage-v8 devDep + config update vitest. Per V1
        # solo backend coverage (impact maggiore visto la massa di
        # sentinel pytest).
        run: pnpm --filter @afianco/embed-sdk test -- --run

  # ─── Packages tests (shared-types + api-client + design-tokens) ────
  packages-vitest:
    name: packages / vitest
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11.4.0
          run_install: false

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run packages tests (excluding embed-sdk)
        run: |
          pnpm --filter "./packages/**" test -- --run

  # ─── Aggregate gate — all jobs must pass ────────────────────────────
  ci-passed:
    name: ci / all-passed
    needs: [backend-pytest, embed-sdk-vitest, packages-vitest]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check job results
        run: |
          if [ "${{ needs.backend-pytest.result }}" != "success" ] || \
             [ "${{ needs.embed-sdk-vitest.result }}" != "success" ] || \
             [ "${{ needs.packages-vitest.result }}" != "success" ]; then
            echo "One or more test jobs failed"
            exit 1
          fi
          echo "All test jobs passed ✓"
